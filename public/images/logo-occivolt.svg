<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" width="420" height="180" role="img" aria-label="Occi'Volt Électricité Générale">
  <title>Occi'Volt Électricité Générale</title>

  <!-- Carte Occitanie (silhouette simplifiée) -->
  <g transform="translate(10, 15) scale(0.82)">
    <path d="
      M 52,10
      C 60,8 72,6 82,10
      C 92,14 98,10 108,8
      C 118,6 126,10 132,16
      C 138,22 136,30 140,36
      C 144,42 152,44 156,50
      C 160,56 158,64 154,70
      C 150,76 144,80 140,86
      C 136,92 136,100 130,106
      C 124,112 116,114 110,120
      C 104,126 100,134 92,138
      C 84,142 76,140 68,136
      C 60,132 54,126 48,120
      C 42,114 36,108 32,100
      C 28,92 28,84 26,76
      C 24,68 20,62 20,54
      C 20,46 24,38 30,32
      C 36,26 44,12 52,10 Z
    " fill="#3D9A47" opacity="0.95"/>
  </g>

  <!-- Éclair (contour noir) -->
  <g transform="translate(42, 18)">
    <path d="
      M 52,4
      L 28,58
      L 44,58
      L 22,118
      L 74,42
      L 56,42
      L 76,4
      Z
    " fill="#1a1a1a" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- Éclair (moitié haute blanche, moitié basse lime) -->
  <g transform="translate(42, 18)">
    <!-- Partie haute — blanc -->
    <clipPath id="clip-top">
      <rect x="0" y="0" width="100" height="62"/>
    </clipPath>
    <path d="
      M 52,4
      L 28,58
      L 44,58
      L 22,118
      L 74,42
      L 56,42
      L 76,4
      Z
    " fill="white" clip-path="url(#clip-top)"/>

    <!-- Partie basse — lime électrique -->
    <clipPath id="clip-bottom">
      <rect x="0" y="62" width="100" height="70"/>
    </clipPath>
    <path d="
      M 52,4
      L 28,58
      L 44,58
      L 22,118
      L 74,42
      L 56,42
      L 76,4
      Z
    " fill="#A3E635" clip-path="url(#clip-bottom)"/>
  </g>

  <!-- Texte "Occi'" -->
  <text
    x="165" y="88"
    font-family="'Plus Jakarta Sans', 'Arial Black', sans-serif"
    font-weight="800"
    font-size="58"
    fill="#1A2E05"
    letter-spacing="-1"
  >Occi'</text>

  <!-- Texte "Volt" -->
  <text
    x="282" y="88"
    font-family="'Plus Jakarta Sans', 'Arial Black', sans-serif"
    font-weight="800"
    font-size="58"
    fill="#65A30D"
    letter-spacing="-1"
  >Volt</text>

  <!-- Sous-titre -->
  <text
    x="168" y="116"
    font-family="'Plus Jakarta Sans', 'Arial', sans-serif"
    font-weight="600"
    font-size="14"
    fill="#1A2E05"
    letter-spacing="2.5"
  >— ÉLECTRICITÉ GÉNÉRALE —</text>
</svg>
